services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whisper
      POSTGRES_USER: whisper
      POSTGRES_PASSWORD: whisper
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-storage:/app/storage
    environment:
      DATABASE_URL: postgresql+asyncpg://whisper:whisper@db:5432/whisper
      REDIS_URL: redis://redis:6379/0
      MODEL_STORAGE_PATH: /app/storage/models
      AUDIO_STORAGE_PATH: /app/storage/audio
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      HF_MODEL_ID: ivrit-ai/whisper-large-v3-turbo
      HF_CT2_MODEL_ID: ivrit-ai/whisper-large-v3-turbo-ct2
      CORS_ORIGINS: http://localhost:3000
      MIN_RECORDINGS_FOR_TRAINING: "50"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - backend-storage:/app/storage
    environment:
      DATABASE_URL: postgresql+asyncpg://whisper:whisper@db:5432/whisper
      REDIS_URL: redis://redis:6379/0
      MODEL_STORAGE_PATH: /app/storage/models
      AUDIO_STORAGE_PATH: /app/storage/audio
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      HF_MODEL_ID: ivrit-ai/whisper-large-v3-turbo
      HF_CT2_MODEL_ID: ivrit-ai/whisper-large-v3-turbo-ct2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  backend-storage:
